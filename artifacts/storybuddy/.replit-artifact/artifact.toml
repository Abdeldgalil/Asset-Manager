kind = "web"
previewPath = "/"
title = "StoryBuddy"
version = "1.0.0"
id = "artifacts/storybuddy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20684

[services.development]
run = "pnpm --filter @workspace/storybuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/storybuddy", "run", "build" ]
publicDir = "artifacts/storybuddy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20684"
BASE_PATH = "/"
