<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="60%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#4d79ff"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Stars -->
  <text x="60" y="110" font-size="60" fill="#FFE566" opacity="0.9">⭐</text>
  <text x="380" y="130" font-size="45" fill="#FFE566" opacity="0.8">✨</text>
  <text x="40" y="430" font-size="40" fill="#FFE566" opacity="0.7">✨</text>
  <text x="420" y="420" font-size="55" fill="#FFE566" opacity="0.85">⭐</text>

  <!-- Book icon -->
  <!-- Book shadow -->
  <rect x="118" y="148" width="276" height="226" rx="18" fill="rgba(0,0,0,0.25)"/>
  <!-- Left page -->
  <rect x="112" y="140" width="140" height="220" rx="12" fill="#fff9e6"/>
  <rect x="112" y="140" width="140" height="220" rx="12" fill="none" stroke="#e8c97a" stroke-width="3"/>
  <!-- Right page -->
  <rect x="252" y="140" width="140" height="220" rx="12" fill="#fff"/>
  <rect x="252" y="140" width="140" height="220" rx="12" fill="none" stroke="#e8c97a" stroke-width="3"/>
  <!-- Spine -->
  <rect x="247" y="140" width="18" height="220" fill="#f0c060"/>

  <!-- Lines on left page -->
  <rect x="128" y="175" width="108" height="8" rx="4" fill="#ffb3cc" opacity="0.8"/>
  <rect x="128" y="198" width="90" height="7" rx="4" fill="#b3d9ff" opacity="0.8"/>
  <rect x="128" y="219" width="100" height="7" rx="4" fill="#b3ffcc" opacity="0.8"/>
  <rect x="128" y="240" width="80" height="7" rx="4" fill="#ffb3cc" opacity="0.8"/>
  <rect x="128" y="261" width="95" height="7" rx="4" fill="#b3d9ff" opacity="0.8"/>
  <rect x="128" y="282" width="85" height="7" rx="4" fill="#b3ffcc" opacity="0.8"/>

  <!-- Star on right page -->
  <text x="268" y="270" font-size="110" fill="#FFD700">⭐</text>

  <!-- Sparkles around book -->
  <circle cx="105" cy="200" r="8" fill="#FFE566" opacity="0.9"/>
  <circle cx="408" cy="180" r="6" fill="#ff9de2" opacity="0.9"/>
  <circle cx="395" cy="330" r="9" fill="#9de2ff" opacity="0.9"/>
  <circle cx="115" cy="340" r="7" fill="#9dffb3" opacity="0.9"/>

  <!-- "SB" text at bottom -->
  <text x="256" y="415" font-size="52" font-weight="900" font-family="Arial Rounded MT Bold, Arial, sans-serif" fill="#fff" text-anchor="middle" opacity="0.95">StoryBuddy</text>
</svg>
